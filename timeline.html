<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mina Nasser | Timeline</title>
    <link rel="icon" href="./img/portfolio/favicon.ico" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      class="fas fa-chevron-down"
      href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Timeline Section -->
    <section class="timeline-section" id="timeline" style="padding-top: 150px">
      <div class="container">
        <div class="section-header" data-aos="fade-up">
          <span
            class="section-subtitle"
            id="timeline-subtitle-en"
            data-i18n="timeline_subtitle_en"
            >JOURNEY</span
          >
          <span
            class="section-subtitle"
            id="timeline-subtitle-ar"
            data-i18n="timeline_subtitle_ar"
            style="display: none"
            >رحلة</span
          >
          <h2 class="section-title">
            My
            <span id="timeline-title-en" data-i18n="timeline_title_en"
              >Timeline</span
            >
            <span
              id="timeline-title-ar"
              data-i18n="timeline_title_ar"
              style="display: none"
              >الخط الزمني</span
            >
          </h2>
          <p
            class="timeline-subtitle"
            id="timeline-desc-en"
            data-i18n="timeline_desc_en"
          >
            From Present to Past (2026 ← 2018)
          </p>
          <p
            class="timeline-subtitle"
            id="timeline-desc-ar"
            data-i18n="timeline_desc_ar"
            style="display: none"
          >
            من الحاضر إلى الماضي (2026 ← 2018)
          </p>
        </div>

        <!-- السهم العمودي (يظهر بواسطة CSS) -->
        <div class="timeline-arrow-container">
          <div class="timeline-arrow-line"></div>
          <div class="timeline-arrow-head"></div>
        </div>

        <!-- Timeline Container -->
        <div class="timeline-container" id="timeline-container">
          <!-- Skeleton سيتم تحميله بواسطة JavaScript -->
        </div>
      </div>
    </section>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/timeline.js"></script>
  </body>
</html>
