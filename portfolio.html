<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mina Nasser | Portfolio</title>
    <link rel="icon" href="./img/portfolio/favicon.ico" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Portfolio Section كاملة -->
    <section class="portfolio" id="portfolio" style="padding-top: 150px">
      <div class="container">
        <div class="section-header" data-aos="fade-up">
          <span class="section-subtitle" data-i18n="portfolio_subtitle"
            >PORTFOLIO</span
          >
          <h2 class="section-title" data-i18n="portfolio_title">
            My <span>Projects</span>
          </h2>
        </div>
        <div class="portfolio-grid" id="all-projects">
          <!-- كل المشاريع هتتحمل بالـ JavaScript -->
        </div>
      </div>
    </section>

    <!-- GitHub Repos Section -->
    <section class="github-repos" id="github">
      <div class="container">
        <div class="section-header" data-aos="fade-up">
          <span class="section-subtitle" data-i18n="github_subtitle"
            >OPEN SOURCE</span
          >
          <h2 class="section-title">
            GitHub <span data-i18n="github_title">Repositories</span>
          </h2>
        </div>
        <div class="repos-grid" id="repos-grid"></div>
      </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/portfolio.js"></script>
  </body>
</html>
